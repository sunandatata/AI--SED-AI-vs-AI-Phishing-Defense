
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Google Sign-In</title>
    <style>
        body { font-family: 'Roboto', arial, sans-serif; background-color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { border: 1px solid #dadce0; border-radius: 8px; padding: 48px 40px 36px; width: 450px; text-align: center; }
        .logo { width: 75px; margin-bottom: 20px; }
        h1 { font-size: 24px; font-weight: 400; margin-bottom: 8px; }
        p { color: #202124; font-size: 16px; margin-bottom: 40px; }
        input[type="email"] { width: 100%; padding: 13px 15px; border: 1px solid #dadce0; border-radius: 4px; font-size: 16px; margin-bottom: 10px; box-sizing: border-box; }
        .btn-primary { background-color: #1a73e8; color: #fff; border: none; padding: 10px 24px; border-radius: 4px; font-weight: 500; cursor: pointer; float: right; margin-top: 20px; }
        .footer { margin-top: 100px; display: flex; justify-content: space-between; font-size: 12px; color: #70757a; }
    </style>
</head>
<body>
    <div class="login-box">
        <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" alt="Google" class="logo">
        <h1>Sign in</h1>
        <p>to continue to Gmail</p>
        <input type="email" placeholder="Email or phone">
        <div style="text-align: left; color: #1a73e8; font-weight: 500; font-size: 14px; cursor: pointer;">Forgot email?</div>
        <button class="btn-primary">Next</button>
        <div class="footer">
            <span>English (United States)</span>
            <span>Help Privacy Terms</span>
        </div>
    </div>
</body>
</html>
