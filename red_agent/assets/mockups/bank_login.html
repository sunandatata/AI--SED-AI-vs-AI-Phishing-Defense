
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Online Banking - Sign In</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #004a8e; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 4px; width: 400px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h2 { color: #004a8e; margin-bottom: 30px; border-bottom: 2px solid #ffcc00; padding-bottom: 10px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-sign-in { width: 100%; padding: 15px; background-color: #ffcc00; border: none; border-radius: 4px; font-size: 18px; font-weight: bold; color: #004a8e; cursor: pointer; margin-top: 10px; }
        .links { margin-top: 20px; font-size: 14px; text-align: center; color: #004a8e; }
    </style>
</head>
<body>
    <div class="login-box">
        <div style="font-size: 24px; font-weight: bold; color: #004a8e; margin-bottom: 20px;">GLOBAL SECURE BANK</div>
        <h2>Sign In to Online Banking</h2>
        <div class="input-group">
            <label>Online ID</label>
            <input type="text">
        </div>
        <div class="input-group">
            <label>Passcode</label>
            <input type="password">
        </div>
        <button class="btn-sign-in">Sign In</button>
        <div class="links">Forgot ID/Passcode? | Security & Help</div>
    </div>
</body>
</html>
